<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page6</title>
  <link rel="stylesheet" href="../css/style6.css">
</head>
<body>
  <section class="hero">
    <!-- Texto + Logo -->
    <div class="hero-text">
      <img src="../image/imagen6/Font circle.png" alt="Logo circular" class="logo-main">

      <h1>THE eWatch with the newest microchip technology</h1>
      <p>
        Lorem ipsum dolor sit amet, consectetur adipiscing elit. 
        Faucibus in libero risus semper habitant arcu eget.

      </p>
      <div class="buttons">
        <a href="#" class="btn btn-black">Order now</a>
        <a href="#" class="btn btn-white">Explore more</a>

      <!-- Barra de features -->
      <section class="features-bar">
        <div class="feature"><span class="icon"> <img src="../image/imagen6/Icons.png" alt=""></span><p>Lorem ipsum</p></div>

    </div>

    <!-- Imagen principal del reloj -->
    <div class="hero-image">
      <div class="image-wrapper">
        <img src="../image/imagen6/Image group.png" alt="eWatch" class="watch">
        <span class="decor star top-left">✦</span>
        <span class="decor star bottom-right">✦</span>

    </div>
